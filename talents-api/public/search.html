<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Talents</title>
  <link rel="stylesheet" href="/public/style.css">
</head>

<body>
  <div class="container">
    <h1>Talent Search</h1>
    <div class="auth" style="display: flex; align-items: center; gap: 10px;">
      <input type="password" id="apiKey" placeholder="Enter API Key">
      <label style="font-size: 0.9em; color: #666; cursor: pointer;">
        <input type="checkbox" id="saveKey"> Save Key
      </label>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name or description..." oninput="debounceSearch()">
    </div>
    <div id="status"></div>
    <div id="results"></div>
  </div>
  <script src="/public/app.js"></script>
</body>

</html>
