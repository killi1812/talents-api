services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  talents-api:
    build:
      context: ./src
      args:
        VERSION: ${VERSION:-0.0.0}
        COMMIT_HASH: ${COMMIT_HASH:-n/a}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-n/a}
        BUILD_TYPE: dev
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - ADMIN_API_KEY=admin-secret-key
      - PORT=8080
      - SEED_DATA=true
    depends_on:
      - mongodb

volumes:
  mongo-data:
